services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_ENABLE_PHONE_AUTH: ${VITE_ENABLE_PHONE_AUTH:-false}
        VITE_REQUIRE_PHONE_VERIFICATION_BEFORE_ORDER: ${VITE_REQUIRE_PHONE_VERIFICATION_BEFORE_ORDER:-false}
        VITE_PHONEPE_ENABLED: ${VITE_PHONEPE_ENABLED:-false}
        VITE_SAMPLE_COUPON_CODE: ${VITE_SAMPLE_COUPON_CODE:-WELCOME10}
        VITE_SAMPLE_COUPON_HINT: ${VITE_SAMPLE_COUPON_HINT:-Use this launch coupon at checkout.}
    image: candleora/frontend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3000}:80"
    networks:
      - candleora
