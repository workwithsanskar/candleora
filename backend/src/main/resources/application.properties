spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/candleora;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration/h2}

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}

server.port=${PORT:8080}

app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-with-at-least-32-characters}
app.jwt.expiration-ms=86400000
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.backend-url=${BACKEND_URL:http://localhost:8080}
app.invoice.from-email=${APP_INVOICE_FROM_EMAIL:${spring.mail.username:no-reply@candleora.com}}
app.invoice.support-email=${APP_INVOICE_SUPPORT_EMAIL:support@candleora.com}
app.invoice.company-name=${APP_INVOICE_COMPANY_NAME:CandleOra}
app.email.resend-api-key=${RESEND_API_KEY:}
app.email.resend-base-url=${RESEND_BASE_URL:https://api.resend.com}
app.frontend-origin-patterns=${FRONTEND_ORIGIN_PATTERNS:https://*.vercel.app}
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
app.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.auth.require-phone-verification-before-order=${APP_REQUIRE_PHONE_VERIFICATION_BEFORE_ORDER:false}
app.orders.cancellation-window-minutes=${APP_ORDER_CANCELLATION_WINDOW_MINUTES:1440}
app.google.client-id=${GOOGLE_CLIENT_ID:656222355759-iec9vbgq515md0qove22guaue72c9216.apps.googleusercontent.com}
app.firebase.project-id=${FIREBASE_PROJECT_ID:candleora-2026}
app.phonepe.base-url=${PHONEPE_BASE_URL:https://api-preprod.phonepe.com/apis/pg-sandbox}
app.phonepe.merchant-id=${PHONEPE_MERCHANT_ID:}
app.phonepe.salt-key=${PHONEPE_SALT_KEY:}
app.phonepe.salt-index=${PHONEPE_SALT_INDEX:}
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
app.coupons.sample.enabled=${APP_SAMPLE_COUPON_ENABLED:false}
app.coupons.sample.code=${APP_SAMPLE_COUPON_CODE:}
app.coupons.sample.type=${APP_SAMPLE_COUPON_TYPE:PERCENTAGE}
app.coupons.sample.value=${APP_SAMPLE_COUPON_VALUE:0}
app.coupons.sample.max-discount=${APP_SAMPLE_COUPON_MAX_DISCOUNT:0}
app.coupons.sample.min-order-amount=${APP_SAMPLE_COUPON_MIN_ORDER_AMOUNT:0}
app.coupons.sample.usage-limit=${APP_SAMPLE_COUPON_USAGE_LIMIT:0}
app.ship24.enabled=${APP_SHIP24_ENABLED:false}
app.ship24.api-key=${APP_SHIP24_API_KEY:}
app.ship24.base-url=${APP_SHIP24_BASE_URL:https://api.ship24.com/public/v1}
app.ship24.sync-interval-ms=${APP_SHIP24_SYNC_INTERVAL_MS:600000}
app.shiprocket.enabled=${APP_SHIPROCKET_ENABLED:false}
app.shiprocket.email=${APP_SHIPROCKET_EMAIL:}
app.shiprocket.password=${APP_SHIPROCKET_PASSWORD:}
app.shiprocket.base-url=${APP_SHIPROCKET_BASE_URL:https://apiv2.shiprocket.in/v1/external}
