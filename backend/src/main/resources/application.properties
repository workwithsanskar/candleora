spring.application.name=candleora-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/candleora}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sanskar@13}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.port=8080

app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-with-at-least-32-characters}
app.jwt.expiration-ms=86400000
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
