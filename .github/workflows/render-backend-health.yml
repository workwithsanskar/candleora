name: Render Backend Health

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check public health endpoint
        run: curl --fail --show-error --silent https://candleora.onrender.com/api/health
      - name: Check catalog endpoint
        run: curl --fail --show-error --silent "https://candleora.onrender.com/api/products?page=0&size=1"
